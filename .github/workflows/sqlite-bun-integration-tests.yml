name: sqlite-bun-integration-tests

on:
  pull_request:
    paths:
      - 'packages/sqlite-bun/**'
      - 'packages/sql-storage/**'
      - 'packages/adapter-tests/**'
      - 'packages/core/**'
      - 'scripts/test-integration.sh'
      - '.github/workflows/sqlite-bun-integration-tests.yml'

jobs:
  integration-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build local test dependencies
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/sql-storage && bun run build && cd ../..
          cd packages/adapter-tests && bun run build && cd ../..

      - name: Run shared SQL storage tests
        run: |
          cd packages/sql-storage
          bun test

      - name: Run sqlite-bun local adapter tests
        run: |
          cd packages/sqlite-bun
          bun test \
            src/test/MintOperationRepository.test.ts \
            src/test/SendOperationRepository.test.ts \
            src/test/MeltOperationRepository.test.ts \
            src/test/contract.test.ts

      - name: Run sqlite-bun integration tests
        run: ./scripts/test-integration.sh sqlite-bun

      - name: Run sqlite-bun custom-unit integration tests
        run: ./scripts/test-integration.sh sqlite-bun --custom-unit usd

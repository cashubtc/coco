name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Check dependency release age
        run: bun run security:release-age

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Publish to npm
        run: bunx changeset publish

  publish-rc:
    if: ${{ github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Check dependency release age
        run: bun run security:release-age

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Version RC packages
        run: |
          bunx changeset pre enter rc
          bunx changeset version
          bun scripts/prepare-rc-release.ts
          rm .changeset/pre.json

      - name: Build packages
        run: bun run build

      - name: Publish RC to npm
        run: bunx changeset publish --tag rc

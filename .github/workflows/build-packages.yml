name: build-packages

on:
  push:
    branches:
      - master
    paths:
      - 'packages/**'
      - 'scripts/build.ts'
      - 'scripts/check-release-age.ts'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'package.json'
      - '.github/workflows/build-packages.yml'
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/build.ts'
      - 'scripts/check-release-age.ts'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'package.json'
      - '.github/workflows/build-packages.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Check dependency release age
        run: bun run security:release-age

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages in dependency order
        run: bun run build

      - name: Typecheck packages in dependency order
        run: bun run typecheck

      - name: Run React package tests
        run: bun run --filter='@cashu/coco-react' test

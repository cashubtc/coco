name: expo-sqlite-integration-tests

on:
  pull_request:
    paths:
      - 'packages/expo-sqlite/**'
      - 'packages/sql-storage/**'
      - 'packages/adapter-tests/**'
      - 'packages/core/**'
      - 'scripts/test-integration.sh'
      - '.github/workflows/expo-sqlite-integration-tests.yml'

jobs:
  integration-tests:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build local test dependencies
        run: |
          cd packages/core && bun run build && cd ../..
          cd packages/sql-storage && bun run build && cd ../..
          cd packages/adapter-tests && bun run build && cd ../..

      - name: Run shared SQL storage tests
        run: |
          cd packages/sql-storage
          bun test

      - name: Run expo-sqlite local adapter tests
        run: |
          cd packages/expo-sqlite
          bun test src/test/contract.test.ts

      - name: Run expo-sqlite integration tests
        run: ./scripts/test-integration.sh expo-sqlite

      - name: Run expo-sqlite custom-unit integration tests
        run: ./scripts/test-integration.sh expo-sqlite --custom-unit usd
